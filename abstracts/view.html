<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CIRMS 2026 — Abstract</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <link href="abstracts.css" rel="stylesheet">
</head>
<body class="bg-light">

<header class="conf-header text-white py-3 mb-4">
  <div class="container">
    <a class="back-link d-block mb-1" href="../schedule/">← Schedule</a>
    <h1 class="h4 fw-semibold mb-1">CIRMS 2026 — Abstract</h1>
    <p class="mb-0 text-secondary small">Council on Ionizing Radiation Measurements and Standards &nbsp;·&nbsp; April 13–15, 2026</p>
  </div>
</header>

<div class="container pb-5">
  <div class="card shadow-sm">
    <div class="card-body p-4 abstract-body" id="content">
      <p class="text-muted text-center py-4" id="status">Loading…</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  const file = new URLSearchParams(location.search).get("file");
  const content = document.getElementById("content");

  if (!file) {
    content.innerHTML = '<p class="text-danger text-center">No abstract specified.</p>';
  } else {
    document.title = `CIRMS 2026 — ${file}`;
    fetch(file)
      .then(r => { if (!r.ok) throw new Error(`${r.status} ${r.statusText}`); return r.text(); })
      .then(md => { content.innerHTML = marked.parse(md); })
      .catch(err => { content.innerHTML = `<p class="text-danger text-center">Could not load <code>${file}</code>: ${err.message}</p>`; });
  }
</script>
</body>
</html>

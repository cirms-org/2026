<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CIRMS 2026 — Abstracts</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <link href="abstracts.css" rel="stylesheet">
</head>
<body class="bg-light">

<header class="conf-header text-white py-3 mb-4">
  <div class="container">
    <a class="back-link d-block mb-1" href="../schedule/">← Schedule</a>
    <h1 class="h4 fw-semibold mb-1">CIRMS 2026 — Abstracts</h1>
    <p class="mb-0 text-secondary small">Council on Ionizing Radiation Measurements and Standards &nbsp;·&nbsp; April 13–15, 2026</p>
  </div>
</header>

<div class="container pb-5">
  <ul class="list-group shadow-sm" id="abstract-list">
    <li class="list-group-item text-muted">Loading…</li>
  </ul>
</div>

<script>
  fetch("files.json")
    .then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); })
    .then(files => {
      const list = document.getElementById("abstract-list");
      list.innerHTML = files.map(f =>
        `<li class="list-group-item">
           <a class="abstract-list" href="view.html?file=${f}">${f}</a>
         </li>`
      ).join("");
    })
    .catch(err => {
      document.getElementById("abstract-list").innerHTML =
        `<li class="list-group-item text-danger">Could not load file list: ${err.message}</li>`;
    });
</script>

</body>
</html>

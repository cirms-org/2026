<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIRMS 2026 — Posters and Essays</title>

    <!-- External CSS -->
    <link href="https://unpkg.com/tabulator-tables@6.4.0/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/dataview.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="header">
            <h1 class="mb-2">CIRMS 2026 — Posters and Essays</h1>
            <p class="text-muted mb-0">Annual Meeting  ·  April 13–15, 2026</p>
        </div>

        <div class="table-container">
            <div class="controls">
                <input type="file" id="fileInput" accept=".csv,.json,.yaml,.yml" style="display: none;">
                <button id="loadFile" class="btn btn-sm btn-file d-none">
                    <svg width="16" height="16" fill="currentColor" class="bi bi-upload" viewBox="0 0 16 16" style="margin-right: 4px; vertical-align: text-bottom;">
                        <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                        <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/>
                    </svg>
                    Load Data File
                </button>
                <button id="clearFilters" class="btn btn-sm btn-clear me-auto">Clear Filters</button>
                <div id="downloadButtons" class="ms-auto d-flex gap-1 d-none">
                    <span class="text-muted me-1" style="position: relative; top: 3px;">Download:</span>
                    <button id="downloadCsv" class="btn btn-sm btn-csv" style="margin-left: 15px;">.csv</button>
                    <button id="downloadXlsx" class="btn btn-sm btn-xlsx" style="margin-left: 5px;">.xlsx</button>
                    <button id="downloadPdf" class="btn btn-sm btn-pdf" style="margin-left: 5px;">.pdf</button>
                    <button id="downloadJson" class="btn btn-sm btn-json" style="margin-left: 5px;">.json</button>
                    <button id="downloadYaml" class="btn btn-sm btn-yaml" style="margin-left: 5px;">.yaml</button>
                </div>
            </div>

            <div id="empty-state" class="empty-state">
                ↑ Load a file to get started
            </div>

            <div id="error" class="error" style="display: none;"></div>

            <div id="data-table"></div>

            <div class="stats" id="stats"></div>
        </div>
    </div>

    <!-- External Libraries -->
    <script src="https://unpkg.com/tabulator-tables@6.4.0/dist/js/tabulator.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@4.2.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@5.0.7/dist/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.1/dist/js-yaml.min.js"></script>

    <!-- Application Scripts -->
    <script src="js/config.js"></script>
    <script src="js/data-flattener.js"></script>
    <script src="js/parser-registry.js"></script>
    <script src="js/import/import-csv.js"></script>
    <script src="js/import/import-yaml.js"></script>
    <script src="js/import/import-json.js"></script>
    <script src="js/export/export-csv.js"></script>
    <script src="js/export/export-xlsx.js"></script>
    <script src="js/export/export-pdf.js"></script>
    <script src="js/export/export-json.js"></script>
    <script src="js/export/export-yaml.js"></script>
    <script src="js/table-manager.js"></script>
    <script src="js/file-loader.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
